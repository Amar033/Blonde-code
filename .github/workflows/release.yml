name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset:  blonde-linux-x64
            os:     ubuntu-latest
          - target: bun-linux-arm64
            asset:  blonde-linux-arm64
            os:     ubuntu-24.04-arm
          - target: bun-darwin-x64
            asset:  blonde-darwin-x64
            os:     macos-latest
          - target: bun-darwin-arm64
            asset:  blonde-darwin-arm64
            os:     macos-latest
          - target: bun-windows-x64
            asset:  blonde-windows-x64.exe
            os:     windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # darwin-x64 is cross-compiled from the ARM64 runner.
      # bun install only pulls the arm64 native, so we force-install the x64 one.
      - name: Install darwin-x64 native package (cross-arch only)
        if: matrix.target == 'bun-darwin-x64'
        run: npm install --ignore-scripts --legacy-peer-deps @opentui/core-darwin-x64

      - name: Inject version into src/version.ts
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION_CLEAN="${TAG#v}"
          # -i.bak is portable: macOS needs the suffix, Linux/Windows are fine with it
          sed -i.bak "s/export const VERSION = '.*';/export const VERSION = '${VERSION_CLEAN}';/" src/version.ts
          rm -f src/version.ts.bak

      - name: Build ${{ matrix.asset }}
        shell: bash
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            --outfile=${{ matrix.asset }} \
            src/ui/run.tsx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum blonde-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "blonde ${{ github.ref_name }}"
          body: |
            ## Install

            **Linux / macOS** (one-liner):
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Amar033/Blonde-code/${{ github.ref_name }}/scripts/install.sh | bash
            ```

            **Manual download:** pick the binary for your platform below, make it executable, and move it to a directory on your `$PATH`.

            | Platform | Binary |
            |---|---|
            | Linux x64 | `blonde-linux-x64` |
            | Linux arm64 | `blonde-linux-arm64` |
            | macOS Intel | `blonde-darwin-x64` |
            | macOS Apple Silicon | `blonde-darwin-arm64` |
            | Windows x64 | `blonde-windows-x64.exe` |

            ## Update
            If you already have blonde installed:
            ```bash
            blonde --update
            ```
          files: |
            dist/blonde-linux-x64
            dist/blonde-linux-arm64
            dist/blonde-darwin-x64
            dist/blonde-darwin-arm64
            dist/blonde-windows-x64.exe
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false
